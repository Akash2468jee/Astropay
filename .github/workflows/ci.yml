name: AstroTip CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - run: npm run build

  smart-contract:
    name: Build Soroban Smart Contract
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts/tipjar

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm target
        run: rustup target add wasm32v1-none

      - name: Build Contract
        run: cargo build --target wasm32v1-none --release

      - name: Run Contract Tests
        run: cargo test